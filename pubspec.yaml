name: kitaplig
description: "KitapLig — Kitapları kısa paragraflarla dikey formatta oku. Lig sistemi ile arkadaşlarınla yarış!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.3.3

  # Offline Database
  sqflite: ^2.4.1
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.1.0

  # Sharing
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.3

  # Animations
  lottie: ^3.3.1

  # Env
  flutter_dotenv: ^5.2.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # Permissions
  permission_handler: ^11.3.1

  # App info (version display)
  package_info_plus: ^8.1.3

  # In-app browser (privacy policy, terms)
  url_launcher: ^6.3.1

  # Audio player
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Social Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Subscriptions (RevenueCat)
  purchases_flutter: ^9.14.0

  # Ads (Google AdMob)
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false
