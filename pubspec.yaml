name: shortskitap
description: "Shorts Kitap — Read books in vertical short paragraph format"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.3.3

  # Offline Database
  sqflite: ^2.4.1
  path: ^1.9.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Sharing
  share_plus: ^10.1.4

  # Animations
  lottie: ^3.3.1

  # Env
  flutter_dotenv: ^5.2.1

  # Connectivity
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - .env
