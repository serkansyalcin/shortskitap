<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg"> <!-- Arka plan gölge efekti --> <rect x="5" y="25" width="50" height="75" rx="10" fill="#d4e8c3" />

